<!DOCTYPE html>
<html lang="zh-CN">
<head>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Inter', 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0A0C12;
            color: #EDEEF2;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 场景切换按钮栏 */
        .scene-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 20px 0;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background: rgba(10, 12, 18, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .scene-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: #EDEEF2;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }

        .scene-btn.active {
            background: #6C5CE7;
            border-color: #6C5CE7;
            box-shadow: 0 4px 14px rgba(108, 92, 231, 0.3);
        }

        .scene-btn:hover {
            background: rgba(108, 92, 231, 0.7);
            border-color: #6C5CE7;
        }

        /* ========== HERO 模块 - 全屏背景图 ========== */
        .hero {
            position: relative;
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 32px;
            margin: 8px 0 48px;
            overflow: hidden;
        }

        /* 背景图层 */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.4s ease-in-out;
            z-index: 0;
        }

        /* 深色遮罩层，保证文字可读 */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.55) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(108, 92, 231, 0.25);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #C4B5FD;
            margin-bottom: 24px;
            border: 1px solid rgba(108, 92, 231, 0.3);
        }

        .hero h1 {
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.25rem;
            color: #E2E8F0;
            margin-bottom: 32px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        .scene-tag {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0 16px;
            font-size: 0.9rem;
            color: #C4B5FD;
        }

        .cta-button {
            background: #6C5CE7;
            border: none;
            padding: 14px 42px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .cta-button:hover {
            background: #5b4bc4;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.5);
        }

        /* 通用模块标题 */
        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 48px;
            letter-spacing: -0.01em;
        }

        /* Pain Point 痛点卡片 */
        .pain-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 64px;
        }
        .pain-card {
            background: #13161F;
            border-radius: 24px;
            padding: 28px;
            flex: 1;
            min-width: 200px;
            text-align: center;
            border-left: 4px solid #FF6B6B;
            transition: transform 0.2s;

        .pain-card h4 { font-size: 1.3rem; margin-bottom: 8px; }
        .pain-card p { color: #A9AFCC; font-size: 0.9rem; line-height: 1.5; }

        /* Solution 方案区 */
        .solution-box {
            background: linear-gradient(145deg, #13161F, #0F111A);
            border-radius: 48px;
            padding: 48px 40px;
            margin-bottom: 64px;
            border: 1px solid #2A2F3F;
        }
        .solution-highlight {
            font-size: 1.2rem;
            color: #A78BFA;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .solution-desc {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #E2E8F0;
        }

        /* Features 三列 */
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            justify-content: center;
            margin-bottom: 64px;
        }
        .feature-card {
            background: #13161F;
            border-radius: 32px;
            padding: 32px 24px;
            flex: 1;
            min-width: 220px;
            text-align: center;
            border: 1px solid #2A2F3F;
            transition: all 0.2s;
        }
        .feature-card:hover { transform: translateY(-5px); border-color: #6C5CE7; }
        .feature-icon { font-size: 2.8rem; margin-bottom: 16px; }
        .feature-card h3 { font-size: 1.5rem; margin-bottom: 12px; }
        .feature-card p { color: #A9AFCC; font-size: 0.95rem; }

        /* Use Cases 强化场景 - 只显示当前场景，沉浸式卡片 */
        .usecase-single {
            background: linear-gradient(145deg, #6C5CE7, #4A3BB5);
            border-radius: 48px;
            padding: 48px 40px;
            margin-bottom: 64px;
            text-align: center;
        }
        .usecase-single h2 {
            font-size: 2rem;
            margin-bottom: 16px;
        }
        .usecase-single .scene-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        .usecase-detail-rich {
            max-width: 750px;
            margin: 0 auto;
            text-align: left;
            background: rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 36px;
            margin-top: 28px;
            backdrop-filter: blur(4px);
        }
        .usecase-detail-rich p {
            margin: 18px 0;
            line-height: 1.8;
            font-size: 1rem;
        }
        .usecase-detail-rich .highlight {
            color: #FFD966;
            font-weight: 600;
        }

        /* CTA 区域 */
        .cta-section {
            background: linear-gradient(135deg, #6C5CE7 0%, #4A3BB5 100%);
            border-radius: 48px;
            padding: 64px 32px;
            text-align: center;
            margin-bottom: 48px;
        }
        .cta-section h2 { font-size: 2rem; margin-bottom: 16px; }
        .cta-section p { margin-bottom: 32px; opacity: 0.9; }
        .cta-big {
            background: white;
            color: #6C5CE7;
            padding: 16px 48px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        footer {
            text-align: center;
            padding: 48px 0 32px;
            border-top: 1px solid #262B38;
            color: #7C83A3;
        }

        @media (max-width: 768px) {
            .hero { min-height: 70vh; }

            .section-title { font-size: 1.8rem; }
            .container { padding: 0 16px; }
            .usecase-detail-rich { padding: 24px; }
            .solution-box { padding: 32px 24px; }
        }
    </style>
</head>

                ${data.features.map(f => `
                    <div class="feature-card">
                        <div class="feature-icon">${f.icon}</div>
                        <h3>${f.title}</h3>
                        <p>${f.desc}</p>
                    </div>
                `).join('')}
            </div>

            <!-- 5. USE CASES 强化场景 -->
            <div class="usecase-single">
                <div class="scene-icon">${data.useCase.icon}</div>
                <h2>${data.useCase.title}</h2>
                <div class="usecase-detail-rich">
                    <p>${data.useCase.detail1}</p>
                    <p>${data.useCase.detail2}</p>
                    <p>${data.useCase.detail3}</p>
                    ${data.useCase.detail4 ? `<p>${data.useCase.detail4}</p>` : ''}
                    <p><span class="highlight">✨ ${data.useCase.result}</span></p>
                </div>
            </div>

            <!-- 6. CTA 行动召唤 -->
            <div class="cta-section">
                <h2>🚀 安静世界，从 QuietFlow 开始</h2>
                <p>前1000名预订用户享早鸟价 $149（原价 $249）</p>
                <button class="cta-big" onclick="alert('前往独立站：quietflow.ai/pre-order')">立即预订 →</button>
                <p style="margin-top: 24px; font-size: 0.8rem;">30天无理由退货 · 2年保修 · 全球顺丰包邮</p>
            </div>
        `;

        app.innerHTML = html;
    }

    // 切换场景函数
    function switchScene(sceneKey) {
        if (!scenesData[sceneKey]) return;
        currentScene = sceneKey;
        renderScene(sceneKey);
        // 更新顶部按钮激活样式
        document.querySelectorAll(".scene-btn").forEach(btn => {
            if (btn.getAttribute("data-scene") === sceneKey) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
        // 滚动到顶部
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 绑定顶部按钮事件
    function bindTopButtons() {
        document.querySelectorAll(".scene-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const scene = btn.getAttribute("data-scene");
                if (scene) switchScene(scene);
            });
        });
    }

    // 初始化渲染
    renderScene("plane");
    bindTopButtons();
</script>
</body>
</html>
